name: Build & Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

env:
  UUID: o-tiling@oliwebd.github.com

jobs:
  # ── Version consistency check ────────────────────────────────────────────
  verify-versions:
    name: Verify version consistency
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check package.json vs metadata.json version match
        run: |
          PKG_VERSION=$(jq -r '.version' package.json)
          META_VERSION=$(jq -r '.version' metadata.json)

          echo "package.json version : ${PKG_VERSION}"
          echo "metadata.json version: ${META_VERSION}"

          PKG_MAJOR_MINOR=$(echo "${PKG_VERSION}" | cut -d. -f1,2)

          if [ "${META_VERSION}" != "${PKG_MAJOR_MINOR}" ] && [ "${META_VERSION}" != "${PKG_VERSION}" ]; then
            echo "::error::Version mismatch — package.json (${PKG_VERSION}) does not align with metadata.json (${META_VERSION})"
            exit 1
          fi

          echo "✓ Versions are consistent"

      - name: Check metadata.json UUID matches workflow env
        run: |
          META_UUID=$(jq -r '.uuid' metadata.json)
          if [ "${META_UUID}" != "${UUID}" ]; then
            echo "::error::UUID mismatch — metadata.json has '${META_UUID}', workflow env has '${UUID}'"
            exit 1
          fi
          echo "✓ UUID is consistent"

      - name: Check metadata.json shell-version
        run: |
          SUPPORTED=$(jq -r '."shell-version" | join(" ")' metadata.json)
          echo "Declared shell versions: ${SUPPORTED}"
          echo "✓ Shell-version check complete"

  # ── Build job ────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: verify-versions

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libglib2.0-bin \
            libglib2.0-dev \
            gettext

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check (lint)
        run: pnpm run lint

      - name: Build extension
        run: pnpm run build

      - name: Copy static assets to dist
        run: |
          cp metadata.json dist/metadata.json
          if [ -d schemas ]; then
            cp -r schemas/ dist/schemas/
          fi

      - name: Compile GSchema
  run: glib-compile-schemas dist/schemas/

      - name: Verify build output
        run: |
          echo "── Build contents ──"
          ls -lh dist/
          echo ""
          test -f dist/extension.js  || (echo "::error::extension.js missing"   && exit 1)
          test -f dist/prefs.js      || (echo "::error::prefs.js missing"       && exit 1)
          test -f dist/metadata.json || (echo "::error::metadata.json missing"  && exit 1)
          test -f dist/schemas/gschemas.compiled \
            || (echo "::error::compiled schema missing" && exit 1)
          echo "✓ All required files present"

      - name: Verify no gi://Gdk import in extension process files
        run: |
          OFFENDERS=$(grep -rl "gi://Gdk" dist/ \
            --include="*.js" \
            | grep -v "prefs.js" \
            | grep -v "color_dialog" || true)
          if [ -n "${OFFENDERS}" ]; then
            echo "::error::Forbidden gi://Gdk import found in extension process:"
            echo "${OFFENDERS}"
            exit 1
          fi
          echo "✓ No forbidden gi://Gdk imports"

      - name: Verify GNOME versions declared in metadata
        run: |
          SUPPORTED=$(jq -r '."shell-version" | join(", ")' dist/metadata.json)
          echo "Extension supports GNOME Shell: ${SUPPORTED}"

      - name: Compile GSchema for verification
        run: |
          glib-compile-schemas dist/schemas/
          echo "✓ GSchema compiled successfully"

      - name: Package extension zip
        run: |
          ZIP_NAME="${UUID}.zip"
          cd dist && zip -r "../${ZIP_NAME}" . && cd ..
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV
          echo "── Zip contents ──"
          unzip -l "${ZIP_NAME}"
          echo ""
          echo "Zip size: $(du -sh ${ZIP_NAME} | cut -f1)"

      - name: Verify zip does not exceed EGO size limit (10 MB)
        run: |
          SIZE_BYTES=$(stat -c%s "${ZIP_NAME}")
          MAX_BYTES=$((10 * 1024 * 1024))
          echo "Zip size: ${SIZE_BYTES} bytes (limit: ${MAX_BYTES})"
          if [ "${SIZE_BYTES}" -gt "${MAX_BYTES}" ]; then
            echo "::error::Zip exceeds the 10 MB EGO submission limit"
            exit 1
          fi
          echo "✓ Zip size is within EGO limit"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension
          path: ${{ env.ZIP_NAME }}
          retention-days: 30
          if-no-files-found: error

  # ── Release job (runs only on version tags) ──────────────────────────────
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: extension
          path: artifacts/

      - name: List downloaded artifacts
        run: find artifacts/ -type f | sort

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}"         >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Release version: ${VERSION}"

      - name: Verify tag version matches package.json
        run: |
          PKG_VERSION=$(jq -r '.version' package.json)
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [ "${PKG_VERSION}" != "${TAG_VERSION}" ]; then
            echo "::error::Tag version (${TAG_VERSION}) does not match package.json (${PKG_VERSION})"
            exit 1
          fi
          echo "✓ Tag version matches package.json"

      - name: Generate changelog from commits
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]' | sed -n '2p')
          echo "Previous tag: ${PREV_TAG:-<none>}"

          if [ -n "${PREV_TAG}" ]; then
            LOG=$(git log "${PREV_TAG}..HEAD" \
              --pretty=format:"- %s (%h)" \
              --no-merges \
              | head -50)
          else
            LOG=$(git log \
              --pretty=format:"- %s (%h)" \
              --no-merges \
              | head -50)
          fi

          {
            echo "CHANGELOG<<EOF"
            echo "${LOG:-No changes recorded.}"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Build release notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cat > release_notes.md <<EOF
          ## O-tiling v${VERSION}

          A distro-agnostic, EGO-compliant auto-tiling engine for GNOME Shell with the **Aura** focus border.

          ### Supported GNOME Shell versions
          GNOME Shell 49 (Fedora 43) and 50 (Fedora 44).

          > **Installation:**
          > \`\`\`bash
          > gnome-extensions install --force ${UUID}.zip
          > gnome-extensions enable ${UUID}
          > \`\`\`
          > Log out and back in on Wayland to activate.

          ### Changes since last release
          ${{ steps.changelog.outputs.CHANGELOG }}

          ---
          *Built with Node $(node --version) · pnpm $(pnpm --version)*
          EOF
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "O-tiling v${{ steps.version.outputs.version }}"
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          fail_on_unmatched_files: true
          files: artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
