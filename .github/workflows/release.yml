name: Build & Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

env:
  UUID: o-tiling@oliwebd.github.com

jobs:
  # ── Build job ────────────────────────────────────────────────────────────
  build:
    name: Build (GNOME ${{ matrix.gnome-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        gnome-version: ["49", "50"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libglib2.0-bin \
            libglib2.0-dev \
            gettext

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check (lint)
        run: pnpm run lint

      - name: Build extension
        run: pnpm run build

      - name: Verify build output
        run: |
          echo "── Build contents ──"
          ls -lh dist/
          echo ""
          test -f dist/extension.js  || (echo "ERROR: extension.js missing" && exit 1)
          test -f dist/prefs.js       || (echo "ERROR: prefs.js missing"     && exit 1)
          test -f dist/metadata.json  || (echo "ERROR: metadata.json missing" && exit 1)
          test -f dist/schemas/gschemas.compiled || (echo "ERROR: compiled schema missing" && exit 1)
          echo "✓ All required files present"

      - name: Verify GNOME version declared in metadata
        run: |
          SUPPORTED=$(jq -r '."shell-version" | join(", ")' dist/metadata.json)
          echo "Extension supports GNOME Shell: $SUPPORTED"
          echo "$SUPPORTED" | grep -q "${{ matrix.gnome-version }}" \
            || echo "::warning::GNOME ${{ matrix.gnome-version }} not declared in shell-version"

      - name: Package extension zip (GNOME ${{ matrix.gnome-version }})
        run: |
          ZIP_NAME="${UUID}-gnome${{ matrix.gnome-version }}.zip"
          # -j junks path prefixes so zip contains flat files (EGO requirement)
          cd dist && zip -r "../${ZIP_NAME}" . && cd ..
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV
          echo "── Zip contents ──"
          unzip -l "${ZIP_NAME}"
          echo ""
          echo "Zip size: $(du -sh ${ZIP_NAME} | cut -f1)"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-gnome${{ matrix.gnome-version }}
          path: ${{ env.ZIP_NAME }}
          retention-days: 30
          if-no-files-found: error

  # ── Release job (runs only on version tags) ──────────────────────────────
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for changelog generation

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: extension-gnome*
          path: artifacts/
          merge-multiple: false

      - name: List downloaded artifacts
        run: find artifacts/ -type f | sort

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}"     >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Release version: ${VERSION}"

      - name: Generate changelog from commits
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]' | sed -n '2p')
          echo "Previous tag: ${PREV_TAG:-<none>}"

          if [ -n "${PREV_TAG}" ]; then
            LOG=$(git log "${PREV_TAG}..HEAD" \
              --pretty=format:"- %s (%h)" \
              --no-merges \
              | head -50)
          else
            LOG=$(git log \
              --pretty=format:"- %s (%h)" \
              --no-merges \
              | head -50)
          fi

          {
            echo "CHANGELOG<<EOF"
            echo "${LOG:-No changes recorded.}"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Build release notes
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cat > release_notes.md <<EOF
          ## O-tiling v${VERSION}

          A distro-agnostic, EGO-compliant auto-tiling engine for GNOME Shell with the **Aura** focus border.

          ### Supported GNOME Shell versions
          | Artifact | GNOME Shell |
          |---|---|
          | \`${UUID}-gnome49.zip\` | GNOME Shell 49 (Fedora 43) |
          | \`${UUID}-gnome50.zip\` | GNOME Shell 50 (Fedora 44) |

          > **Installation:** Download the zip for your GNOME version, then run:
          > \`\`\`bash
          > gnome-extensions install --force ${UUID}-gnomeXX.zip
          > \`\`\`
          > Log out and back in on Wayland to activate.

          ### Changes since last release
          ${{ steps.changelog.outputs.CHANGELOG }}

          ---
          *Built with Node $(node --version) · pnpm $(pnpm --version)*
          EOF
          echo "Notes written to release_notes.md"
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "O-tiling v${{ steps.version.outputs.version }}"
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          fail_on_unmatched_files: true
          files: |
            artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
