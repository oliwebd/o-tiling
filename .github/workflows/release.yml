name: Build & Release v1

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-rc*"
      - "v*.*.*-beta*"
  pull_request:
    branches:
      - main
      - rc
  workflow_dispatch:

permissions:
  contents: write

env:
  UUID: o-tiling@oliwebd.github.com
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Version consistency check ────────────────────────────────────────────
  verify-versions:
    name: Verify version consistency
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag branch constraint
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          echo "Verifying branch containment for tag: ${TAG_NAME}"

          git fetch origin

          if [[ "${TAG_NAME}" =~ -rc ]] || [[ "${TAG_NAME}" =~ -beta ]]; then
            if ! git branch -r --contains "${TAG_NAME}" | grep -q "origin/rc"; then
              echo "::error::Pre-release tag ${TAG_NAME} (rc/beta) must be pushed on the 'rc' branch."
              exit 1
            fi
            echo "✓ Pre-release tag ${TAG_NAME} is on the 'rc' branch"
          else
            if ! git branch -r --contains "${TAG_NAME}" | grep -E -q "origin/main|origin/master"; then
              echo "::error::Production release tag ${TAG_NAME} must be pushed on 'main' or 'master' branch."
              exit 1
            fi
            echo "✓ Production tag ${TAG_NAME} is on a release branch (main/master)"
          fi

      - name: Check package.json version matches git tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PKG_VERSION=$(jq -r '.version' package.json)
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          # Strip any pre-release suffix from the tag for comparison (e.g. v2.9.12-rc1 → 2.9.12)
          TAG_BASE="${TAG_VERSION%%-*}"

          echo "package.json version: ${PKG_VERSION}"
          echo "git tag version     : ${TAG_VERSION} (base: ${TAG_BASE})"

          if [ "${PKG_VERSION}" != "${TAG_BASE}" ]; then
            echo "::error::Version mismatch — package.json (${PKG_VERSION}) does not match git tag (${TAG_BASE})"
            exit 1
          fi

          echo "✓ package.json version matches git tag"

      - name: Check metadata.json UUID matches workflow env
        run: |
          META_UUID=$(jq -r '.uuid' metadata.json)
          if [ "${META_UUID}" != "${UUID}" ]; then
            echo "::error::UUID mismatch — metadata.json has '${META_UUID}', workflow env has '${UUID}'"
            exit 1
          fi
          echo "✓ UUID is consistent"

      - name: Check metadata.json shell-version
        run: |
          SUPPORTED=$(jq -r '."shell-version" | join(" ")' metadata.json)
          echo "Declared shell versions: ${SUPPORTED}"
          echo "✓ Shell-version check complete"

  # ── Build job ────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: verify-versions

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libglib2.0-bin \
            libglib2.0-dev \
            gettext

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check (lint)
        run: pnpm run lint

      - name: Build extension
        run: make build

      - name: Verify build output
        run: |
          echo "── Build contents ──"
          ls -lh dist/
          echo ""
          test -f dist/extension.js || (echo "::error::extension.js missing" && exit 1)
          test -f dist/prefs.js     || (echo "::error::prefs.js missing"     && exit 1)
          echo "✓ Basic build artifacts present"

      - name: Verify no gi://Gdk import in extension process files
        run: |
          OFFENDERS=$(grep -rl "gi://Gdk" dist/ \
            --include="*.js" \
            | grep -v "prefs.js" \
            | grep -v "color_dialog" || true)
          if [ -n "${OFFENDERS}" ]; then
            echo "::error::Forbidden gi://Gdk import found in extension process:"
            echo "${OFFENDERS}"
            exit 1
          fi
          echo "✓ No forbidden gi://Gdk imports"

      - name: Extract version for zip name
        id: pkg-version
        run: echo "VERSION=$(jq -r '.version' package.json)" >> $GITHUB_OUTPUT

      - name: Package extension
        run: |
          make pack
          VERSION="${{ steps.pkg-version.outputs.VERSION }}"
          ZIP_NAME="${UUID}-v${VERSION}.zip"
          mv "${UUID}.zip" "${ZIP_NAME}"
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV
          echo "── Zip contents ──"
          unzip -l "${ZIP_NAME}"
          echo ""
          echo "Zip size: $(du -sh ${ZIP_NAME} | cut -f1)"

      - name: Verify zip does not exceed EGO size limit (10 MB)
        run: |
          SIZE_BYTES=$(stat -c%s "${ZIP_NAME}")
          MAX_BYTES=$((10 * 1024 * 1024))
          echo "Zip size: ${SIZE_BYTES} bytes (limit: ${MAX_BYTES})"
          if [ "${SIZE_BYTES}" -gt "${MAX_BYTES}" ]; then
            echo "::error::Zip exceeds the 10 MB EGO submission limit"
            exit 1
          fi
          echo "✓ Zip size is within EGO limit"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension
          path: ${{ env.ZIP_NAME }}
          retention-days: 30
          if-no-files-found: error

  # ── Release job (runs only on version tags) ──────────────────────────────
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: extension
          path: artifacts/

      - name: List downloaded artifacts
        run: find artifacts/ -type f | sort

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}"         >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Release version: ${VERSION}"

      - name: Verify tag version matches package.json
        run: |
          PKG_VERSION=$(jq -r '.version' package.json)
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [ "${PKG_VERSION}" != "${TAG_VERSION}" ]; then
            echo "::error::Tag version (${TAG_VERSION}) does not match package.json (${PKG_VERSION})"
            exit 1
          fi
          echo "✓ Tag version matches package.json"

      - name: Generate changelog from commits
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]' | sed -n '2p')
          echo "Previous tag: ${PREV_TAG:-<none>}"

          if [ -n "${PREV_TAG}" ]; then
            LOG=$(git log "${PREV_TAG}..HEAD" \
              --pretty=format:"- %s (%h)" \
              --no-merges \
              | head -50)
          else
            LOG=$(git log \
              --pretty=format:"- %s (%h)" \
              --no-merges \
              | head -50)
          fi

          {
            echo "CHANGELOG<<EOF"
            echo "${LOG:-No changes recorded.}"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Build release notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          RC_NOTICE=""
          if [[ "${VERSION}" =~ -rc ]]; then
            RC_NOTICE="> [!WARNING]\n> This is a **Release Candidate** pre-release version. It is intended for testing and feedback. Please report any bugs or issues on GitHub.\n\n"
          elif [[ "${VERSION}" =~ -beta ]]; then
            RC_NOTICE="> [!WARNING]\n> This is a **Beta** pre-release version. It is intended for testing and feedback. Please report any bugs or issues on GitHub.\n\n"
          fi

          printf "%b" "${RC_NOTICE}" > release_notes.md

          cat >> release_notes.md <<EOF
          ## O-tiling v${VERSION}

          A distro-agnostic, EGO-compliant auto-tiling engine for GNOME Shell with the **Aura** focus border.

          ### Supported GNOME Shell versions
          GNOME Shell 49 (Fedora 43) and 50 (Fedora 44).

          > **⚡ Quick Install (One Command):**
          > \`\`\`bash
          > curl -L https://github.com/oliwebd/o-tiling/releases/download/v${VERSION}/${UUID}-v${VERSION}.zip \\
          >   -o /tmp/o-tiling.zip \\
          >   && gnome-extensions install --force /tmp/o-tiling.zip \\
          >   && gnome-extensions enable ${UUID}
          > \`\`\`
          >
          > **📦 Manual Install:**
          > \`\`\`bash
          > gnome-extensions install --force ~/Downloads/${UUID}-v${VERSION}.zip
          > gnome-extensions enable ${UUID}
          > \`\`\`
          > *Note: Log out and back in to activate.*

          ### Changes since last release
          ${{ steps.changelog.outputs.CHANGELOG }}

          ---
          *Built with Node $(node --version) · pnpm $(pnpm --version)*
          EOF
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "v${{ steps.version.outputs.version }}"
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          fail_on_unmatched_files: true
          files: artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── EGO upload (production tags only — no rc/beta) ───────────────────────
  ego-upload:
    name: Upload to extensions.gnome.org
    runs-on: ubuntu-latest
    needs: release
    if: |
      startsWith(github.ref, 'refs/tags/v') &&
      !contains(github.ref, '-rc') &&
      !contains(github.ref, '-beta')

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: extension
          path: artifacts/

      - name: Locate zip file
        id: zip
        run: |
          ZIP_PATH=$(find artifacts/ -name "*.zip" | head -1)
          if [ -z "${ZIP_PATH}" ]; then
            echo "::error::No zip file found in artifacts/"
            exit 1
          fi
          echo "ZIP_PATH=${ZIP_PATH}" >> $GITHUB_OUTPUT
          echo "Uploading: ${ZIP_PATH} ($(du -sh "${ZIP_PATH}" | cut -f1))"

      - name: Install requests
        run: pip install --quiet requests

      - name: Upload to extensions.gnome.org
        env:
          EGO_USERNAME: ${{ secrets.EGO_USERNAME }}
          EGO_PASSWORD: ${{ secrets.EGO_PASSWORD }}
          ZIP_PATH: ${{ steps.zip.outputs.ZIP_PATH }}
        run: |
          python3 - <<'PYEOF'
          import os, sys, requests

          EGO_BASE   = "https://extensions.gnome.org"
          LOGIN_URL  = f"{EGO_BASE}/api/v1/accounts/login/"
          UPLOAD_URL = f"{EGO_BASE}/api/v1/extensions"

          username = os.environ["EGO_USERNAME"]
          password = os.environ["EGO_PASSWORD"]
          zip_path = os.environ["ZIP_PATH"]

          session = requests.Session()
          session.headers.update({"User-Agent": "o-tiling-ci/1.0 (GitHub Actions)"})

          # ── Step 1: Fetch CSRF token ───────────────────────────────────────
          print("→ Fetching CSRF token …")
          resp = session.get(f"{EGO_BASE}/accounts/login/", timeout=30)
          resp.raise_for_status()
          csrf = session.cookies.get("csrftoken")
          if not csrf:
              print("::error::Could not retrieve CSRF token.")
              sys.exit(1)
          print("  CSRF token obtained.")

          # ── Step 2: Login → extract token from response body ──────────────
          print("→ Authenticating …")
          auth = session.post(
              LOGIN_URL,
              json={"login": username, "password": password},
              headers={"X-CSRFToken": csrf, "Referer": f"{EGO_BASE}/accounts/login/"},
              timeout=30,
          )
          print(f"  Auth HTTP {auth.status_code}")

          if auth.status_code not in (200, 201):
              print(f"::error::Authentication failed (HTTP {auth.status_code}).")
              print(f"  Response: {auth.text[:500]}")
              sys.exit(1)

          try:
              auth_body = auth.json()
          except Exception:
              print(f"::error::Login response is not JSON: {auth.text[:500]}")
              sys.exit(1)

          # EGO returns {"detail": "Login successful", "token": {"token": "...", "expiry": "..."}}
          token = auth_body.get("token", {}).get("token")
          if not token:
              print(f"::error::No token found in login response: {auth_body}")
              sys.exit(1)
          print("  Authenticated. Token obtained.")

          # Refresh CSRF after login
          csrf = session.cookies.get("csrftoken", csrf)

          # ── Step 3: Upload using Token auth ───────────────────────────────
          print(f"→ Uploading {zip_path} …")
          with open(zip_path, "rb") as f:
              up = session.post(
                  UPLOAD_URL,
                  files={"source": (os.path.basename(zip_path), f, "application/zip")},
                  data={"shell_license_compliant": "true", "tos_compliant": "true"},
                  headers={
                      "X-CSRFToken": csrf,
                      "Referer": EGO_BASE,
                      "Authorization": f"Token {token}",
                  },
                  timeout=120,
              )

          print(f"  HTTP {up.status_code}")
          try:
              print(f"  Response: {up.json()}")
          except Exception:
              print(f"  Response: {up.text[:500]}")

          if up.status_code in (200, 201):
              print("✓ Uploaded and queued for review.")
          else:
              print(f"::error::Upload failed (HTTP {up.status_code}).")
              sys.exit(1)
          PYEOF
